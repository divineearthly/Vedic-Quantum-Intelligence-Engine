name: VQIE CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ build-essential

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pybind11 torch pandas numpy scikit-learn joblib paho-mqtt flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Compile C++ Vedic Kernels
      run: |
        cd vedic_algorithms/src/
        make clean
        make

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vedic-engine-binary
        path: vedic_algorithms/src/vedic_engine*.so

    - name: Run Integration Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/vedic_algorithms/src:$(pwd)/lightweight_ai/models:$(pwd)/lightweight_ai/utils
        python scripts/test_sensor_scenarios.py
